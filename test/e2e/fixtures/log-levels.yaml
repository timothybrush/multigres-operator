apiVersion: multigres.com/v1alpha1
kind: MultigresCluster
metadata:
  name: e2e-log-levels
  namespace: default
spec:
  postgresPasswordSecretRef:
    name: multigres-admin-password
    key: password
  pvcDeletionPolicy:
    whenDeleted: Delete
    whenScaled: Delete
  logLevels:
    pgctld: "debug"
    multipooler: "warn"
    multiorch: "debug"
    multiadmin: "warn"
    multigateway: "debug"
  cells:
    - name: "zone-a"
  databases:
    - name: "postgres"
      default: true
      tablegroups:
        - name: "default"
          default: true
          shards:
            - name: "0-inf"
              spec:
                multiorch:
                  replicas: 1
                pools:
                  default:
                    type: readWrite
                    cells: ["zone-a"]
                    # 1 replica for CI resource constraints. Only operator
                    # behavior is tested; data-plane correctness needs more.
                    replicasPerCell: 1
                    storage:
                      size: "1Gi"
