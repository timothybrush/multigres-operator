---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: tablegroups.multigres.com
spec:
  group: multigres.com
  names:
    kind: TableGroup
    listKind: TableGroupList
    plural: tablegroups
    shortNames:
    - tbg
    singular: tablegroup
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
